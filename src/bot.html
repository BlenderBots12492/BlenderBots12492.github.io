<!DOCTYPE html>
<html>
    <head>
        <title id="bot_name"></title>
        <link rel="stylesheet" href="src/bot.css">
    </head>
    <body>
        <br>
        <h1 id="bot_name"></h1>
        <br>
        <img id="image"/>
        
        <p id="des"></p>

        <script>
            try {
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }
            fetch(`https://blenderbots12492.github.io/website/src/${getQueryParam("bot")}.json`).then(response => response.json()).then(
                data => {
                    const name = data.name;
                    const descrition = data.description;
                    const imageUrl = data.image;
                    document.querySelector("#bot_name").innerHTML = name;
                    document.querySelector("#image").src = imageUrl;
                    document.querySelector("#des").innerHTML = descrition;
                    document.querySelector("#bot_name").innerHTML = name;

                }
            );
            } catch (e) {
                alert(e)
            }
            </script>
    </body>
    </html>
